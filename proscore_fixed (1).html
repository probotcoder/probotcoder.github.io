function populateMomentum(m, home, away) {
  const canvas = document.getElementById('momentum-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 10; i++) { ctx.beginPath(); ctx.moveTo((i/10)*W,0); ctx.lineTo((i/10)*W,H); ctx.stroke(); }
  // HT marker
  ctx.strokeStyle = '#2a2a2a'; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.setLineDash([]);
  // Zero (center) line
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();

  ctx.fillStyle = '#3a3a3a'; ctx.font = '9px var(--font-head)'; ctx.textAlign = 'center';
  ctx.fillText('HT', W/2, H-4);
  ctx.fillStyle = '#2a2a2a'; ctx.textAlign = 'left';
  ctx.fillText('HOME', 4, 12);
  ctx.textAlign = 'left';
  ctx.fillStyle = '#2a2a2a';
  ctx.fillText('AWAY', 4, H-4);

  // FIX: The API returns momentum as [{m: minute, v: signed_pressure}]
  // positive v = home dominance, negative v = away dominance
  const momentumData = m.momentum;
  if (!Array.isArray(momentumData) || momentumData.length < 2) {
    ctx.fillStyle='#444'; ctx.font='13px var(--font-head)'; ctx.textAlign='center';
    ctx.fillText('Momentum data not available', W/2, H/2);
    ctx.fillStyle='#333'; ctx.font='11px var(--font-head)';
    ctx.fillText('(requires ?full=true on a live/finished match)', W/2, H/2+18);
    return;
  }

  // Find max absolute value for scaling
  const maxAbs = Math.max(...momentumData.map(d => Math.abs(d.v||0)), 1);
  const totalMin = Math.max(momentumData[momentumData.length-1]?.m || 90, 90);

  // Draw filled areas
  const getX = (minute) => (minute / totalMin) * W;
  const getY = (v) => H/2 - (v / maxAbs) * (H/2 - 8); // center is H/2, up is home, down is away

  // Home pressure area (positive v, above center line)
  ctx.beginPath();
  ctx.moveTo(0, H/2);
  momentumData.forEach(d => {
    if ((d.v||0) > 0) ctx.lineTo(getX(d.m), getY(d.v));
    else ctx.lineTo(getX(d.m), H/2);
  });
  ctx.lineTo(getX(momentumData[momentumData.length-1]?.m||90), H/2);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,230,118,0.12)';
  ctx.fill();

  // Away pressure area (negative v, below center line)
  ctx.beginPath();
  ctx.moveTo(0, H/2);
  momentumData.forEach(d => {
    if ((d.v||0) < 0) ctx.lineTo(getX(d.m), getY(d.v));
    else ctx.lineTo(getX(d.m), H/2);
  });
  ctx.lineTo(getX(momentumData[momentumData.length-1]?.m||90), H/2);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,68,68,0.12)';
  ctx.fill();

  // Draw the momentum line
  ctx.beginPath();
  momentumData.forEach((d, i) => {
    const x = getX(d.m);
    const y = getY(d.v||0);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  // Color: gradient from green (home) to red (away) based on value
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#00e676');
  grad.addColorStop(0.5, '#888');
  grad.addColorStop(1, '#ff4444');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.shadowColor = '#00e676';
  ctx.shadowBlur = 3;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Labels
  ctx.fillStyle='rgba(0,230,118,0.7)'; ctx.font='bold 11px var(--font-head)'; ctx.textAlign='left';
  ctx.fillText(home, 8, 16);
  ctx.fillStyle='rgba(255,68,68,0.7)'; ctx.textAlign='left';
  ctx.fillText(away, 8, H-8);
}

// ═══════════════════════════════════════════════════════
//  FIX 3: SHOT MAP — correct 105×68 pitch coordinate system
//  pos.x and pos.y are on a 105×68 metre pitch grid
//  x=0 is the end being attacked (goal), x=105 is the own half
//  Both home and away shots use this convention (attacking direction normalized)
//  So: home attacks toward x=0 (left on pitch = right on our canvas)
//      home canvas_x = (105 - pos.x) / 105 * W
//      away canvas_x = pos.x / 105 * W
//  y: 0=bottom, 68=top → canvas_y = (1 - pos.y/68) * H  (flip for canvas)
// ═══════════════════════════════════════════════════════
function drawPitch(ctx, W, H) {
  // Grass stripes
  for(let i=0;i<12;i++){ctx.fillStyle=i%2===0?'#0a1a0a':'#0c1c0c';ctx.fillRect((i/12)*W,0,W/12,H);}
  // Pitch outline
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;
  ctx.strokeRect(4,4,W-8,H-8);
  // Halfway line
  ctx.beginPath();ctx.moveTo(W/2,4);ctx.lineTo(W/2,H-4);ctx.stroke();
  // Centre circle
  ctx.beginPath();ctx.arc(W/2,H/2,H/6,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W/2,H/2,2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.35)';ctx.fill();
  // Boxes — left (home goal, away attacking end)
  const pw=W*.16, ph=H*.62, sw=W*.06, sh=H*.42, gw=W*.05, gh=H*.28;
  ctx.strokeStyle='rgba(255,255,255,.3)';
  ctx.strokeRect(4,(H-ph)/2,pw,ph);       // penalty box left
  ctx.strokeRect(4,(H-sh)/2,sw,sh);       // 6-yard box left
  ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(0,(H-gh)/2,gw,gh); // goal left
  ctx.strokeRect(0,(H-gh)/2,gw,gh);
  // Right (away goal, home attacking end)
  ctx.strokeRect(W-4-pw,(H-ph)/2,pw,ph);
  ctx.strokeRect(W-4-sw,(H-sh)/2,sw,sh);
  ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(W-gw,(H-gh)/2,gw,gh);
  ctx.strokeRect(W-gw,(H-gh)/2,gw,gh);
  // Penalty spots
  ctx.beginPath();ctx.arc(pw*.7,H/2,2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.3)';ctx.fill();
  ctx.beginPath();ctx.arc(W-pw*.7,H/2,2,0,Math.PI*2);ctx.fill();
  // Penalty arcs
  ctx.beginPath();ctx.arc(pw*.7,H/2,H/8,-.45*Math.PI,.45*Math.PI);ctx.strokeStyle='rgba(255,255,255,.3)';ctx.stroke();
  ctx.beginPath();ctx.arc(W-pw*.7,H/2,H/8,.55*Math.PI,1.45*Math.PI);ctx.stroke();
}

function populateShotMap(m, home, away) {
  const canvas = document.getElementById('shot-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  drawPitch(ctx, W, H);

  // FIX: shotmap uses 105×68 pitch grid
  // pos.x: distance from the goal being attacked (0 = goal, 105 = own half)
  // pos.y: 0 = bottom touchline, 68 = top touchline
  // home attacks right→left on our canvas (goal at left side, x=0 in pitch = right side canvas)
  // away attacks left→right on our canvas (goal at right side, x=0 in pitch = left side canvas)
  const shots = m.shotmap;

  if (!Array.isArray(shots) || shots.length === 0) {
    // Show demo shots with correct positioning
    ctx.fillStyle='rgba(255,200,0,0.6)';ctx.font='11px var(--font-head)';ctx.textAlign='center';
    ctx.fillText('No shot data available for this match', W/2, H/2-8);
    ctx.fillStyle='rgba(255,200,0,0.35)';ctx.font='9px var(--font-head)';
    ctx.fillText('(shot data requires ?full=true and a match in progress/finished)', W/2, H/2+8);
    // Labels
    ctx.fillStyle='rgba(0,230,118,0.7)';ctx.font='bold 11px var(--font-head)';ctx.textAlign='center';
    ctx.fillText(`← ${home} attacks`, W*.25, 16);
    ctx.fillStyle='rgba(255,68,68,0.7)';
    ctx.fillText(`${away} attacks →`, W*.75, 16);
    return;
  }

  // Render real shots
  shots.forEach(s => {
    const pitchX = parseFloat(s.pos?.x ?? 50); // 0-105, 0 = attacking goal
    const pitchY = parseFloat(s.pos?.y ?? 34); // 0-68
    const isHome = s.home === true;
    const type = (s.type || '').toLowerCase();
    const isGoal = type === 'goal';
    const isSave = type === 'save' || type === 'on_target';
    const isBlocked = type === 'block' || type === 'blocked';

    // FIX: correct coordinate transform
    // Home attacks toward right goal (x=105 end → canvas right side)
    // Away attacks toward left goal (x=105 end → canvas left side)
    // Both: x=0 (attacking goal) should map to canvas edge where team attacks
    let canvasX;
    if (isHome) {
      // Home attacking right: x=0 (goal) → canvas right, x=105 (own half) → canvas left
      canvasX = (1 - pitchX / 105) * W;
    } else {
      // Away attacking left: x=0 (goal) → canvas left, x=105 (own half) → canvas right
      canvasX = (pitchX / 105) * W;
    }
    // Y: 0=bottom → canvas bottom, 68=top → canvas top
    const canvasY = (1 - pitchY / 68) * H;

    const xg = s.xg || 0;
    // Size based on xG (min 4px, max 12px for goals)
    const r = isGoal ? Math.max(7, Math.min(12, 5 + xg * 20)) : Math.max(4, Math.min(9, 3 + xg * 15));

    ctx.beginPath();
    ctx.arc(canvasX, canvasY, r, 0, Math.PI * 2);

    if (isGoal) {
      ctx.fillStyle = isHome ? 'rgba(0,230,118,0.92)' : 'rgba(255,68,68,0.92)';
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.fill();
      ctx.stroke();
      // Star marker for goals
      ctx.fillStyle = '#000';
      ctx.font = 'bold 8px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚽', canvasX, canvasY);
    } else if (isSave) {
      ctx.fillStyle = 'rgba(79,195,247,0.75)';
      ctx.fill();
    } else if (isBlocked) {
      ctx.fillStyle = 'rgba(120,120,120,0.6)';
      ctx.fill();
    } else {
      // Off target
      ctx.fillStyle = isHome ? 'rgba(0,200,100,0.35)' : 'rgba(255,80,80,0.35)';
      ctx.strokeStyle = isHome ? 'rgba(0,230,118,0.5)' : 'rgba(255,68,68,0.5)';
      ctx.lineWidth = 1;
      ctx.fill();
      ctx.stroke();
    }

    // xG label for high-value shots
    if (xg > 0.15) {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = '8px var(--font-mono)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(xg.toFixed(2), canvasX, canvasY - r - 1);
    }
  });

  // Team attack direction labels
  ctx.fillStyle='rgba(0,230,118,0.8)'; ctx.font='bold 11px var(--font-head)'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText(`← ${home} attacks`, W*.25, 16);
  ctx.fillStyle='rgba(255,68,68,0.8)';
  ctx.fillText(`${away} attacks →`, W*.75, 16);

  // Shot count summary
  const homeGoals = shots.filter(s=>s.home&&s.type==='goal').length;
  const awayGoals = shots.filter(s=>!s.home&&s.type==='goal').length;
  const homeShots = shots.filter(s=>s.home).length;
  const awayShots = shots.filter(s=>!s.home).length;
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='9px var(--font-head)'; ctx.textAlign='center';
  ctx.fillText(`${homeShots} shots (${homeGoals}G)`, W*.25, H-6);
  ctx.fillText(`${awayShots} shots (${awayGoals}G)`, W*.75, H-6);
}

// ═══════════════════════════════════════════════════════
//  FIX 4: PLAYER STATS — parse paginated response correctly
//  API returns: {count, results: [{event, player, goals, goal_assist, ...}]}
// ═══════════════════════════════════════════════════════
async function fetchPlayerDive(pid) {
  if (!pid || pid==='undefined' || pid==='null') return;
  document.getElementById('pp-name').textContent = 'Loading...';
  document.getElementById('pp-pos').textContent = '';
  document.getElementById('pp-stats').innerHTML = '<div class="popup-stat">Fetching stats...</div>';
  document.getElementById('player-popup').style.display = 'block';

  try {
    // FIX: use /api/players/{id}/ (not v2) + /api/player-stats/?player={id}
    const [detRes, statsRes] = await Promise.allSettled([
      fetch(`${API_PLAYERS}${pid}/`, {headers:HDRS()}),
      fetch(`${API_PLAYER_STATS}?player=${pid}`, {headers:HDRS()})
    ]);

    const detail = detRes.status==='fulfilled' && detRes.value.ok ? await detRes.value.json() : {};
    const statsResp = statsRes.status==='fulfilled' && statsRes.value.ok ? await statsRes.value.json() : {};

    const name = detail.name || detail.short_name || 'Unknown Player';
    const pos = detail.specific_position || detail.position || '?';
    const nationality = detail.nationality || '';
    const height = detail.height ? `${detail.height}cm` : '';
    const foot = detail.preferred_foot || '';
    const marketVal = detail.market_value ? `€${(detail.market_value/1e6).toFixed(1)}M` : '';
    const availability = detail.availability || '';
    const injuryType = detail.injury_type || '';

    // FIX: statsResp is paginated {count, results: [...]}
    const stats = Array.isArray(statsResp.results) ? statsResp.results :
                  Array.isArray(statsResp) ? statsResp : [];

    let apps = 0, goals = 0, assists = 0, mins = 0, shots = 0, keyPasses = 0;
    let totalRating = 0, ratingCount = 0, totalXg = 0;

    stats.forEach(s => {
      apps++;
      goals    += parseInt(s.goals || 0);
      assists  += parseInt(s.goal_assist || 0);
      mins     += parseInt(s.minutes_played || 0);
      shots    += parseInt(s.total_shots || 0);
      keyPasses+= parseInt(s.key_pass || 0);
      totalXg  += parseFloat(s.expected_goals || 0);
      if (s.rating != null && parseFloat(s.rating) > 0) {
        totalRating += parseFloat(s.rating);
        ratingCount++;
      }
    });

    const avgRating = ratingCount ? (totalRating / ratingCount).toFixed(1) : 'N/A';
    const avgXg = apps ? (totalXg / apps).toFixed(2) : 'N/A';

    currentPlayerData = {
      _pid: pid, name, position: pos,
      matches: apps, goals, assists, minutes: mins,
      shots, keyPasses, xg: totalXg.toFixed(2),
      rating: avgRating,
      // FIX: correct image URL is /img/player/{id}/ not /img/players/{id}/
      photo: `https://sports.bzzoiro.com/img/player/${pid}/`
    };

    const imgEl = document.getElementById('pp-img');
    imgEl.style.display = 'block';
    imgEl.src = currentPlayerData.photo;
    imgEl.onerror = () => { imgEl.style.display = 'none'; };

    document.getElementById('pp-name').textContent = name;
    let posStr = pos;
    if (nationality) posStr += ` · ${nationality}`;
    if (height) posStr += ` · ${height}`;
    if (foot) posStr += ` · ${foot === 'R' ? 'Right foot' : foot === 'L' ? 'Left foot' : 'Both feet'}`;
    document.getElementById('pp-pos').textContent = posStr;

    let statsHTML = `
      <div class="popup-stat"><b>${apps}</b> Apps</div>
      <div class="popup-stat"><b>${goals}</b> ⚽ Goals</div>
      <div class="popup-stat"><b>${assists}</b> 🎯 Assists</div>
      <div class="popup-stat"><b>${mins}'</b> ⏱ Mins</div>
      <div class="popup-stat"><b>${avgRating}</b> ⭐ Rating</div>
      <div class="popup-stat"><b>${shots}</b> 🎯 Shots</div>
      <div class="popup-stat"><b>${totalXg.toFixed(2)}</b> xG</div>`;

    if (marketVal) statsHTML += `<div class="popup-stat"><b>${marketVal}</b> 💰</div>`;
    if (availability && availability !== 'available') {
      statsHTML += `<div class="popup-stat" style="border-color:var(--red)"><b style="color:var(--red)">${availability}</b>${injuryType?' · '+injuryType:''}</div>`;
    }

    document.getElementById('pp-stats').innerHTML = statsHTML;

    if (!apps) {
      document.getElementById('pp-stats').innerHTML += '<div style="font-size:0.7rem;color:#555;margin-top:8px;text-align:center">No match stats recorded yet this season</div>';
    }

    // Radar chart
    const canvas = document.getElementById('pp-radar');
    const maxApps = 40, maxGoals = 20, maxAssists = 15, maxRating = 10;
    const norm = [
      Math.min(apps / maxApps, 1),
      Math.min(goals / maxGoals, 1),
      Math.min(assists / maxAssists, 1),
      apps ? Math.min(mins / (apps * 90), 1) : 0,
      ratingCount ? Math.min(parseFloat(avgRating) / maxRating, 1) : 0.3,
      Math.min(shots / Math.max(apps * 3, 1), 1)
    ];
    drawRadarChart(canvas, ['Apps','Goals','Assists','Mins/G','Rating','Shots'], norm, [], '#00e676', 'transparent');
    document.getElementById('pp-compare-btn').textContent = compareSlot.find(c=>c._pid===pid) ? '✓ Added' : (compareSlot.length>=2 ? 'Replace & Compare' : '+ Compare');
  } catch (e) {
    console.error('Player fetch error:', e);
    toast('Failed to load player data', 'error');
    document.getElementById('pp-stats').innerHTML = '<div style="color:#555;font-size:0.8rem">Could not load stats</div>';
  }
}

function drawRadarChart(canvas, labels, hNorm, aNorm, hColor, aColor) {
  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2, r=Math.min(W,H)/2-24;
  const N=labels.length;
  ctx.clearRect(0,0,W,H);
  for (let ri=1;ri<=4;ri++) {
    ctx.beginPath();
    for (let i=0;i<N;i++) {
      const angle = (Math.PI*2/N)*i - Math.PI/2;
      const x = cx + (r*ri/4)*Math.cos(angle), y = cy + (r*ri/4)*Math.sin(angle);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath(); ctx.strokeStyle='#1e1e1e'; ctx.lineWidth=1; ctx.stroke();
  }
  for (let i=0;i<N;i++) {
    const angle = (Math.PI*2/N)*i - Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*Math.cos(angle), cy+r*Math.sin(angle));
    ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1; ctx.stroke();
    const lx = cx+(r+14)*Math.cos(angle), ly = cy+(r+14)*Math.sin(angle);
    ctx.fillStyle='#555'; ctx.font='8px var(--font-head)'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(labels[i], lx, ly);
  }
  const drawPoly = (norm, color) => {
    if (!norm || !norm.length) return;
    ctx.beginPath();
    for (let i=0;i<N;i++) {
      const angle = (Math.PI*2/N)*i - Math.PI/2;
      const v = Math.min(Math.max(norm[i]||0,0),1);
      const x = cx+r*v*Math.cos(angle), y = cy+r*v*Math.sin(angle);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    const alpha = color.includes('#') ? 'rgba(0,230,118,0.15)' : color.replace(')',',0.15)').replace('rgb','rgba');
    ctx.fillStyle = alpha; ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
  };
  drawPoly(hNorm, hColor);
  if (aColor !== 'transparent' && aNorm && aNorm.length) drawPoly(aNorm, aColor);
}

function addToCompare() {
  if (!currentPlayerData) return;
  if (compareSlot.find(c=>c._pid===currentPlayerData._pid)) { toast('Already in comparison'); return; }
  if (compareSlot.length >= 2) compareSlot.shift();
  compareSlot.push({...currentPlayerData});
  toast(`${currentPlayerData.name} added to compare`);
  document.getElementById('pp-compare-btn').textContent = '✓ Added';
  if (compareSlot.length === 2) setTimeout(openCompare, 300);
}

function openCompare() {
  if (compareSlot.length < 2) { toast('Add 2 players to compare','error'); return; }
  const [p1,p2] = compareSlot;
  const stats = [
    {key:'Appearances', v1:p1.matches, v2:p2.matches},
    {key:'Goals', v1:p1.goals, v2:p2.goals},
    {key:'Assists', v1:p1.assists, v2:p2.assists},
    {key:'xG Total', v1:p1.xg, v2:p2.xg},
    {key:'Minutes', v1:p1.minutes, v2:p2.minutes},
    {key:'Avg Rating', v1:p1.rating, v2:p2.rating}
  ];
  const rows = stats.map(s => {
    const n1 = parseFloat(s.v1), n2 = parseFloat(s.v2);
    const color1 = n1>n2 ? 'color:var(--g)' : n1<n2 ? 'color:var(--red)' : '';
    const color2 = n2>n1 ? 'color:var(--g)' : n2<n1 ? 'color:var(--red)' : '';
    return `<div class="compare-grid">
      <div class="compare-h" style="${color1}">${s.v1}</div><div class="compare-label">${s.key}</div>
      <div class="compare-a" style="${color2}">${s.v2}</div>
    </div>`;
  }).join('');
  document.getElementById('compare-content').innerHTML = `
    <div class="compare-grid" style="margin-bottom:16px;font-weight:800;font-size:0.95rem">
      <div style="text-align:right;color:var(--g)">${esc(p1.name)}</div>
      <div style="text-align:center;color:#333">vs</div>
      <div style="text-align:left;color:var(--red)">${esc(p2.name)}</div>
    </div>${rows}
    <div style="text-align:center;margin-top:12px">
      <button class="btn-outline" style="font-size:0.75rem;padding:6px 14px" onclick="compareSlot=[];closeCompare();toast('Comparison cleared')">Clear & Start Over</button>
    </div>`;
  document.getElementById('compare-modal').style.display='block';
}

function closeCompare() { document.getElementById('compare-modal').style.display='none'; }
function closePlayerPopup() { document.getElementById('player-popup').style.display='none'; }

// Click on player links in timeline / lineups
document.addEventListener('click', e => {
  const pl = e.target.closest('[data-pid]');
  if (pl && pl.dataset.pid && pl.dataset.pid!=='undefined' && pl.dataset.pid!=='null') {
    e.stopPropagation(); fetchPlayerDive(pl.dataset.pid);
  }
});

// ─── MODAL TABS ───
function openTab(evt, id) {
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  document.querySelectorAll('#modal-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  const tabEl = document.getElementById(id);
  if (tabEl) tabEl.style.display = 'block';
  evt.currentTarget.classList.add('active');

  if (id === 't-momentum' || id === 't-shotmap') {
    setTimeout(() => {
      const canvasId = id === 't-momentum' ? 'momentum-canvas' : 'shot-canvas';
      const canvas = document.getElementById(canvasId);
      if (canvas && currentModalMatch) {
        canvas.width = Math.min(640, canvas.offsetWidth || 640);
        canvas.height = id === 't-momentum' ? 200 : 300;
        if (id === 't-momentum') {
          populateMomentum(currentModalMatch, currentModalHome, currentModalAway);
          if (currentModalMomentumInterval) clearInterval(currentModalMomentumInterval);
          if (getMatchState(currentModalMatch) === 'LIVE') {
            currentModalMomentumInterval = setInterval(async () => {
              try {
                const res = await fetch(`${API}${currentModalId}/?full=true`, { headers: HDRS() });
                if (!res.ok) return;
                const data = await res.json();
                currentModalMatch = data?.data || data || {};
                const c = document.getElementById('momentum-canvas');
                if (c && document.getElementById('t-momentum').style.display !== 'none') {
                  populateMomentum(currentModalMatch, currentModalHome, currentModalAway);
                }
              } catch(e) {}
            }, 10000);
          }
        } else {
          populateShotMap(currentModalMatch, currentModalHome, currentModalAway);
        }
      }
    }, 60);
  }
}

function closeModal() {
  if (currentModalMomentumInterval) clearInterval(currentModalMomentumInterval);
  currentModalMomentumInterval = null;
  document.getElementById('modal').style.display='none';
  currentModalId=null;
}

function openTeamTab(evt, id) {
  document.querySelectorAll('#team-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tm-body .tab-content').forEach(t=>t.style.display='none');
  evt.currentTarget.classList.add('active');
  const el = document.getElementById(id);
  if (el) el.style.display='block';
}
function closeTeamModal() { document.getElementById('team-modal').style.display='none'; }

// ═══════════════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════════════
function openSettings() {
  document.getElementById('api-token-input').value = localStorage.getItem('ps_api_token')||'';
  document.getElementById('settings-modal').style.display='block';
}
function closeSettings() { document.getElementById('settings-modal').style.display='none'; }
function saveSettings() {
  const key = document.getElementById('api-token-input').value.trim();
  if (key) localStorage.setItem('ps_api_token', key);
  else localStorage.removeItem('ps_api_token');
  closeSettings(); toast('✅ Settings saved. Reloading data...');
  loadAllData();
}

// ═══════════════════════════════════════════════════════
//  DATA LOADING
// ═══════════════════════════════════════════════════════
async function loadAllData() {
  try {
    const res = await fetch(API, {headers:HDRS()});
    if (!res.ok) { toast('API error: ' + res.status, 'error'); return; }
    const data = await res.json();
    const ms = data.results||data.data||data||[];
    allMatches = Array.isArray(ms) ? ms : [];
    leagueMap.clear(); allTeamsMap.clear();
    allMatches.forEach(m => {
      const ln = m.league?.name||m.competition?.name||m.tournament?.name||'Other';
      if (!leagueMap.has(ln)) leagueMap.set(ln, []);
      leagueMap.get(ln).push(m);
      ['home','away'].forEach(side => {
        const tn = getTeamName(m,side);
        if (!allTeamsMap.has(tn)) allTeamsMap.set(tn, {matches:[], league:ln});
        allTeamsMap.get(tn).matches.push(m);
      });
    });
    const names = new Set([...leagueMap.keys()]);
    try {
      const lr = await fetch(API_LEAGUES, {headers:HDRS()});
      if (lr.ok) {
        const ld = await lr.json();
        (ld.results||ld.data||ld||[]).forEach(l => { const n=l.name||l.league_name||''; if(n) names.add(n); });
      }
    } catch(e) {}
    allLeagues = [...names].map(name => ({
      name, count:(leagueMap.get(name)||[]).length,
      live:(leagueMap.get(name)||[]).filter(m=>getMatchState(m)==='LIVE').length,
      hasData:leagueMap.has(name)
    })).sort((a,b) => b.live-a.live || (b.hasData?1:0)-(a.hasData?1:0) || a.name.localeCompare(b.name));
    renderSidebar(document.getElementById('league-search').value);
    renderMatchesView();
    updateHeader();
  } catch(e) { console.error('Load error:', e); toast('Failed to load data', 'error'); }
}

function updateHeader() {
  const live = allMatches.filter(m=>getMatchState(m)==='LIVE').length;
  document.getElementById('hdr-live-dot').style.display = live>0?'block':'none';
  document.getElementById('hdr-stat').textContent = live>0 ? `${live} live · ${allMatches.length} total` : `${allMatches.length} matches`;
}

document.addEventListener('keydown', e => {
  if (e.key==='Escape') {
    if (document.getElementById('compare-modal').style.display==='block') closeCompare();
    else if (document.getElementById('settings-modal').style.display==='block') closeSettings();
    else if (document.getElementById('team-modal').style.display==='block') closeTeamModal();
    else if (document.getElementById('player-popup').style.display==='block') closePlayerPopup();
    else closeModal();
  }
});
document.getElementById('settings-modal').addEventListener('click', e => {
  if(e.target===document.getElementById('settings-modal')) closeSettings();
});
document.getElementById('modal').addEventListener('click', e => {
  if(e.target===document.getElementById('modal')) closeModal();
});

loadAllData();
setInterval(loadAllData, 30000);
</script>

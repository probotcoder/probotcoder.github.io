<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProScore v2 | Ultra Deep Football Data</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --g: #00e676; --g2: #00c853; --g3: #69f0ae;
  --bg: #080808; --bg2: #0f0f0f; --card: #141414; --card2: #1a1a1a;
  --border: #222; --border2: #2a2a2a;
  --text: #e0e0e0; --muted: #888; --dim: #555;
  --red: #ff4444; --yellow: #ffcc00; --orange: #ff9800; --blue: #4fc3f7;
  --sidebar-w: 270px;
  --font-head: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-head);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}

.header{background:rgba(10,10,10,0.97);backdrop-filter:blur(20px);border-bottom:1px solid #1a1a1a;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:500;height:56px;gap:12px}
.logo{color:var(--g);font-size:1.3rem;font-weight:900;letter-spacing:4px;text-shadow:0 0 20px rgba(0,230,118,0.4);white-space:nowrap;font-family:var(--font-head)}
.logo sub{font-size:0.55rem;background:var(--g);color:#000;padding:2px 6px;border-radius:20px;font-weight:800;letter-spacing:1px;vertical-align:middle;margin-left:4px}
.nav-tabs{display:flex;gap:2px;flex:1;justify-content:center}
.nav-tab{padding:8px 16px;background:none;border:none;color:var(--muted);font-family:var(--font-head);font-weight:600;font-size:0.82rem;cursor:pointer;border-radius:8px;transition:.2s;display:flex;align-items:center;gap:6px}
.nav-tab:hover{background:#1a1a1a;color:#fff}
.nav-tab.active{background:linear-gradient(135deg,#1a2a1a,#0f1f0f);color:var(--g);box-shadow:0 0 12px rgba(0,230,118,0.15)}
.header-right{display:flex;align-items:center;gap:10px}
.live-dot{width:8px;height:8px;background:var(--g);border-radius:50%;box-shadow:0 0 8px var(--g);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.hdr-stat{font-size:0.75rem;color:var(--muted);font-family:var(--font-mono)}
.sidebar-toggle{background:none;border:1px solid var(--border2);color:var(--g);font-size:1.2rem;cursor:pointer;padding:5px 9px;border-radius:7px;transition:.2s;display:none}
.sidebar-toggle:hover{background:#1a1a1a}
@media(max-width:768px){.sidebar-toggle{display:block}.nav-tab span{display:none}.nav-tab{padding:8px 12px}}

.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:rgba(6,6,6,0.98);border-right:1px solid #161616;display:flex;flex-direction:column;position:sticky;top:56px;height:calc(100vh - 56px);overflow:hidden;z-index:400;transition:transform .3s}
.main-area{flex:1;overflow-y:auto;max-height:calc(100vh - 56px)}
@media(max-width:768px){.sidebar{position:fixed;left:0;top:56px;transform:translateX(-100%);box-shadow:6px 0 30px rgba(0,0,0,.9)}.sidebar.open{transform:translateX(0)}}

.sb-search{padding:12px 14px;border-bottom:1px solid #161616}
.sb-search input{width:100%;padding:9px 12px;background:#141414;border:1px solid #2a2a2a;border-radius:8px;color:#fff;font-size:0.82rem;outline:none;transition:.2s;font-family:var(--font-head)}
.sb-search input:focus{border-color:var(--g);box-shadow:0 0 8px rgba(0,230,118,.15)}
.sb-search input::placeholder{color:#444}
.sb-hdr{padding:14px 18px;font-weight:700;font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:#444;border-bottom:1px solid #161616;display:flex;justify-content:space-between;align-items:center}
.sb-list{flex:1;overflow-y:auto;padding:6px 0}
.league-item{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;cursor:pointer;font-size:0.82rem;color:#999;transition:all .18s;border-left:3px solid transparent;gap:8px;user-select:none;margin-right:4px;border-radius:0 7px 7px 0}
.league-item:hover{background:#141414;color:#fff;border-left-color:#333}
.league-item.active{background:linear-gradient(90deg,#162416,#0c0c0c);color:var(--g);border-left-color:var(--g);font-weight:700;box-shadow:inset 0 0 12px rgba(0,230,118,.08)}
.live-badge{width:7px;height:7px;background:var(--g);border-radius:50%;flex-shrink:0;box-shadow:0 0 8px var(--g);animation:pulse 1.5s infinite}
.cnt-badge{font-size:0.68rem;color:#555;font-family:var(--font-mono)}
.league-item.active .cnt-badge{color:var(--g)}
.league-item.no-data{opacity:.35}

.main-content{padding:18px 20px}
.view{display:none}.view.active{display:block}

.league-group{margin-bottom:20px;background:rgba(15,15,15,.9);border-radius:14px;border:1px solid #1a1a1a;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.league-title{padding:12px 16px;background:#161616;font-weight:800;font-size:0.78rem;border-bottom:1px solid #1e1e1e;text-transform:uppercase;letter-spacing:2px;color:var(--g);text-shadow:0 0 8px rgba(0,230,118,.3);display:flex;align-items:center;gap:10px;cursor:pointer}
.league-title:hover{background:#1c1c1c}
.section-lbl{font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:#444;padding:10px 16px 6px;border-bottom:1px solid #141414}
.section-lbl.live{color:var(--red);border-bottom-color:#1e1a1a}
.section-lbl.upcoming{color:var(--orange);border-bottom-color:#1e1c1a}
.match-card{display:grid;grid-template-columns:1fr 90px 1fr;align-items:center;padding:12px 16px;cursor:pointer;border-bottom:1px solid #161616;transition:background .15s;gap:8px;position:relative}
.match-card:last-child{border-bottom:none}
.match-card:hover{background:#141414}
.match-team{font-size:0.84rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match-team.home{text-align:right}
.match-team.away{text-align:left}
.score-box{text-align:center}
.score-main{font-size:1.3rem;font-weight:900;color:var(--g);display:block;line-height:1.1;font-family:var(--font-mono)}
.score-main.date{font-size:0.82rem;color:#aaa;font-weight:500}
.score-main.live{animation:scoreGlow 2s infinite}
@keyframes scoreGlow{0%,100%{text-shadow:0 0 6px rgba(0,230,118,.4)}50%{text-shadow:0 0 18px rgba(0,230,118,.9)}}
.min-badge{font-size:0.68rem;color:var(--yellow);font-weight:700;display:block;margin-top:2px;font-family:var(--font-mono)}
.min-badge.ft{color:#555}
.form-row{display:flex;justify-content:center;gap:2px;margin-top:3px}
.form-box{width:12px;height:12px;border-radius:3px;font-size:0;display:inline-block}
.form-box.W{background:#00c853}.form-box.D{background:#555}.form-box.L{background:#c62828}
.star-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:#333;font-size:1rem;cursor:pointer;z-index:2;transition:.18s;line-height:1;padding:2px}
.star-btn.on{color:var(--yellow);text-shadow:0 0 6px var(--yellow)}
.star-btn:hover{transform:scale(1.25)}
.prob-bar{display:flex;height:3px;border-radius:2px;overflow:hidden;margin-top:4px;gap:1px}
.prob-home{background:var(--g);transition:width .5s}
.prob-draw{background:#555;transition:width .5s}
.prob-away{background:var(--red);transition:width .5s}

#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:1000;backdrop-filter:blur(8px);overflow-y:auto}
.modal-body{width:95%;max-width:720px;margin:24px auto;background:#0f0f0f;border-radius:18px;display:flex;flex-direction:column;overflow:hidden;border:1px solid #222;box-shadow:0 0 50px rgba(0,0,0,.9)}
.modal-hdr{padding:16px 20px;text-align:center;border-bottom:1px solid #1a1a1a;background:#111}
.modal-title{font-size:1.1rem;font-weight:800}
.modal-meta{font-size:0.75rem;color:#666;margin-top:4px;display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.modal-live-clock{color:var(--g);font-weight:700;font-family:var(--font-mono);margin-top:4px;font-size:0.85rem}
.modal-prob{display:flex;gap:8px;justify-content:center;margin-top:10px;font-family:var(--font-mono);font-size:0.8rem}
.prob-pill{padding:4px 12px;border-radius:20px;font-weight:700}
.prob-h{background:#1a3a1a;color:var(--g)}.prob-d{background:#2a2a2a;color:#aaa}.prob-a{background:#3a1a1a;color:var(--red)}
.modal-tabs{display:flex;background:#111;border-bottom:1px solid #1a1a1a;overflow-x:auto}
.tab-btn{flex:1 0 auto;padding:12px 10px;background:none;border:none;color:#555;font-weight:600;cursor:pointer;transition:.18s;font-size:0.72rem;white-space:nowrap;border-bottom:2px solid transparent;font-family:var(--font-head);letter-spacing:.5px}
.tab-btn.active{color:var(--g);border-bottom-color:var(--g)}
.tab-btn:hover:not(.active){color:#bbb}
.tab-content{padding:16px;display:none;overflow-y:auto;max-height:55vh}
.tab-content.active{display:block}

.event-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #161616}
.event-min{font-weight:700;color:var(--g);min-width:40px;font-size:0.85rem;font-family:var(--font-mono)}
.event-body{flex:1;font-size:0.85rem}
.event-team-lbl{font-size:0.65rem;color:#444;text-transform:uppercase;margin-bottom:3px;letter-spacing:1px}
.player-click{color:#ddd;text-decoration:underline dotted #444;cursor:pointer}
.player-click:hover{color:var(--g)}

.lineup-grid{display:flex;gap:10px}
.team-col{flex:1;background:#0a0a0a;padding:12px;border-radius:10px;border:1px solid #1a1a1a}
.team-col-name{color:var(--g);font-size:0.85rem;font-weight:700;margin-bottom:4px}
.form-tag{display:inline-block;background:#162416;color:var(--g);border:1px solid #1e3a1e;border-radius:5px;padding:3px 7px;font-size:0.65rem;font-weight:700;margin-top:3px}
.mgr-lbl{font-size:0.68rem;color:#555;margin-top:4px}
.player-row{display:flex;justify-content:space-between;align-items:center;padding:7px 4px;border-bottom:1px solid #141414;font-size:0.79rem;cursor:pointer}
.player-row:hover{background:#141414}
.pos-pill{font-size:0.6rem;background:#222;color:#aaa;padding:2px 7px;border-radius:4px;font-weight:700;min-width:30px;text-align:center}
.pos-GK{background:#162233;color:#66aaff}.pos-DEF{background:#162416;color:#66cc66}
.pos-MID{background:#232316;color:#cccc44}.pos-FWD{background:#231616;color:#ff6666}
.subs-hdr{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:#444;margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid #1a1a1a}
.sub-chip{display:inline-flex;align-items:center;gap:4px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:5px;padding:3px 9px;font-size:0.72rem;margin:2px;font-family:var(--font-head)}

.stat-bar-row{margin-bottom:10px}
.stat-bar-labels{display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:4px;font-family:var(--font-mono)}
.stat-bar-label{color:#888;font-size:0.68rem;text-align:center;flex:1;font-family:var(--font-head);letter-spacing:.5px;text-transform:uppercase}
.stat-bar-track{display:flex;height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden;gap:2px}
.stat-bar-home{background:var(--g);border-radius:3px 0 0 3px;transition:width .6s}
.stat-bar-away{background:var(--red);border-radius:0 3px 3px 0;transition:width .6s;margin-left:auto}

.canvas-wrap{position:relative;text-align:center}
.canvas-wrap canvas{max-width:100%;border-radius:10px}
.chart-legend{display:flex;justify-content:center;gap:16px;margin-top:8px;font-size:0.72rem}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}

.weather-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.weather-tile{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:12px;text-align:center}
.weather-val{font-size:1.4rem;font-weight:800;color:var(--g);font-family:var(--font-mono)}
.weather-key{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:#555;margin-top:2px;font-family:var(--font-head)}
.ref-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #141414;font-size:0.82rem}
.ref-key{color:#555}.ref-val{color:#ddd;font-family:var(--font-mono);font-weight:600}

.shot-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:0.72rem}
.shot-key{display:flex;align-items:center;gap:5px}
.shot-dot{width:10px;height:10px;border-radius:50%;display:inline-block}

.unavail-badge{background:#1e1010;border:1px solid #3a1a1a;border-radius:9px;padding:8px 12px;margin-bottom:8px}
.unavail-name{font-weight:600;margin-bottom:3px}
.unavail-meta{font-size:0.72rem;color:#888;display:flex;gap:8px;flex-wrap:wrap}
.unavail-reason{color:var(--red);font-weight:600}
.unavail-susp{color:var(--orange)}
.unavail-return{background:#141414;padding:2px 8px;border-radius:12px;border:1px solid #2a2a2a}

#player-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#141414;border:1px solid var(--g);border-radius:16px;z-index:2000;width:340px;padding:22px;text-align:center;box-shadow:0 0 40px rgba(0,0,0,.95)}
#player-popup img{width:72px;height:72px;border-radius:50%;background:#222;margin-bottom:10px;object-fit:cover}
#player-popup h3{color:var(--g);font-size:1rem;margin-bottom:2px}
.popup-pos{color:#666;font-size:0.75rem;margin-bottom:12px}
.popup-stats{display:flex;justify-content:center;gap:10px;margin:10px 0;flex-wrap:wrap}
.popup-stat{background:#0f0f0f;padding:7px 12px;border-radius:8px;font-size:0.75rem;border:1px solid #1e1e1e;font-family:var(--font-mono)}
.popup-stat b{color:var(--g)}
.compare-btn{background:#1a2a1a;border:1px solid #2a4a2a;color:var(--g);padding:7px 16px;border-radius:20px;cursor:pointer;font-family:var(--font-head);font-weight:600;font-size:0.8rem;margin-top:8px;transition:.2s}
.compare-btn:hover{background:#243a24}

#team-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:1000;backdrop-filter:blur(8px);overflow-y:auto}
.team-modal-body{width:95%;max-width:680px;margin:24px auto;background:#0f0f0f;border-radius:18px;overflow:hidden;border:1px solid #222;box-shadow:0 0 50px rgba(0,0,0,.9)}
.tm-header{padding:20px;background:#111;border-bottom:1px solid #1a1a1a}
.tm-name{font-size:1.4rem;font-weight:900;color:var(--g)}
.tm-meta{font-size:0.75rem;color:#555;margin-top:4px}
.tm-body{padding:18px}
.squad-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:10px}
.squad-card{background:#141414;border:1px solid #1e1e1e;border-radius:9px;padding:10px 12px;cursor:pointer;transition:.15s}
.squad-card:hover{background:#1a1a1a;border-color:#2a2a2a}
.squad-name{font-size:0.82rem;font-weight:600}
.squad-pos{font-size:0.68rem;color:#555;margin-top:2px}

#compare-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:2100;backdrop-filter:blur(8px)}
.compare-body{width:95%;max-width:700px;margin:40px auto;background:#0f0f0f;border-radius:18px;overflow:hidden;border:1px solid #222;padding:20px}
.compare-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.compare-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-bottom:10px;font-size:0.82rem}
.compare-label{text-align:center;color:#555;font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;font-family:var(--font-head)}
.compare-h{text-align:right;font-weight:600;color:var(--g);font-family:var(--font-mono)}
.compare-a{text-align:left;font-weight:600;color:var(--red);font-family:var(--font-mono)}

#settings-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:2000;backdrop-filter:blur(8px)}
.settings-body{width:95%;max-width:500px;margin:60px auto;background:#0f0f0f;border-radius:18px;overflow:hidden;border:1px solid #222;padding:24px}

.close-btn{padding:13px;background:var(--g);color:#000;border:none;font-weight:800;cursor:pointer;font-size:0.88rem;border-radius:0 0 18px 18px;width:100%;font-family:var(--font-head);letter-spacing:1px;transition:.2s}
.close-btn:hover{background:var(--g2)}
.modal-close-x{position:absolute;top:16px;right:16px;background:none;border:1px solid #333;color:#888;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:.2s}
.modal-close-x:hover{border-color:var(--red);color:var(--red)}

.empty{text-align:center;padding:40px 20px;color:#444;font-size:0.88rem}
.empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:.4}

#toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1a2a1a;border:1px solid var(--g);border-radius:10px;padding:12px 16px;font-size:0.82rem;color:#ddd;max-width:280px;animation:slideIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.6)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.error{background:#2a1a1a;border-color:var(--red)}

.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:0.65rem;font-weight:700;letter-spacing:.5px}
.badge-g{background:#1a3a1a;color:var(--g);border:1px solid #2a4a2a}
.badge-y{background:#2a2a14;color:var(--yellow);border:1px solid #3a3a1a}
.badge-r{background:#2a1414;color:var(--red);border:1px solid #3a2020}
.badge-b{background:#14202a;color:var(--blue);border:1px solid #1a2a3a}
.divider{border:none;border-top:1px solid #1a1a1a;margin:14px 0}
.chip{display:inline-flex;align-items:center;gap:4px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:3px 9px;font-size:0.72rem}
select.input-field option{background:#141414;color:#ddd}
.info-card{background:#141414;border:1px solid #1e1e1e;border-radius:12px;padding:16px;margin-bottom:14px}
.info-card h4{margin-bottom:10px;font-size:0.9rem;color:var(--g)}
.btn-primary{background:var(--g);color:#000;border:none;padding:10px 20px;border-radius:9px;font-family:var(--font-head);font-weight:700;cursor:pointer;font-size:0.85rem;transition:.2s}
.btn-primary:hover{background:var(--g2)}
.btn-outline{background:none;border:1px solid #2a2a2a;color:#ccc;padding:10px 20px;border-radius:9px;font-family:var(--font-head);font-weight:600;cursor:pointer;font-size:0.85rem;transition:.2s}
.btn-outline:hover{border-color:var(--g);color:var(--g)}
.input-field{background:#141414;border:1px solid #2a2a2a;color:#fff;padding:10px 14px;border-radius:9px;font-family:var(--font-head);font-size:0.85rem;outline:none;transition:.2s;width:100%}
.input-field:focus{border-color:var(--g)}
.form-group{margin-bottom:14px}
.form-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:#555;margin-bottom:6px;display:block}
.predicted-tag{display:inline-block;background:#2a2a14;color:var(--yellow);border:1px solid #3a3a1a;border-radius:5px;padding:2px 7px;font-size:0.6rem;font-weight:700;margin-left:4px;vertical-align:middle}
.ai-score{font-size:0.55rem;color:#555;font-family:var(--font-mono);margin-left:3px}
</style>
</head>
<body>

<header class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <div class="logo">PROSCORE<sub>v2</sub></div>
  </div>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('matches',this)">⚽ <span>Matches</span></button>
  </nav>
  <div class="header-right">
    <div class="live-dot" id="hdr-live-dot" style="display:none"></div>
    <span class="hdr-stat" id="hdr-stat">Loading...</span>
    <button class="btn-outline" style="padding:5px 12px;font-size:0.72rem" onclick="openSettings()">⚙</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">

<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIGURATION
// ═══════════════════════════════════════════════════════
const DEFAULT_TOKEN = '664f63e05993a56481b4eaef1f51070a3e89eeeb';
const API  = 'https://sports.bzzoiro.com/api/events/';
const API_V2 = 'https://sports.bzzoiro.com/api/v2/';
const API_LEAGUES = 'https://sports.bzzoiro.com/api/leagues/';
const API_PLAYERS_V2 = 'https://sports.bzzoiro.com/api/v2/players/';
const API_PRED    = 'https://sports.bzzoiro.com/api/predicted-lineup/';
const API_TEAMS   = 'https://sports.bzzoiro.com/api/teams/';

function getToken() { return localStorage.getItem('ps_api_token') || DEFAULT_TOKEN; }
function HDRS() { return { 'Authorization': `Token ${getToken()}` }; }

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let allMatches = [], allLeagues = [], leagueMap = new Map();
let selectedLeague = null;
let currentModalId = null, currentModalHome = '', currentModalAway = '';
let liveTimers = new Map();
let starredSet = new Set(JSON.parse(localStorage.getItem('ps_starred') || '[]'));
let allTeamsMap = new Map();
let compareSlot = [];
let currentPlayerData = null;
let currentModalMatch = null;

// ═══════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
const escJ = s => s ? String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"') : '';

function toast(msg, type='ok') {
  const t = document.createElement('div');
  t.className = 'toast' + (type==='error' ? ' error' : '');
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function resolveName(obj) {
  if (!obj) return null;
  if (typeof obj === 'string' && obj.trim().length > 0) return obj.trim();
  const keys = ['name','player_name','common_name','full_name','playerName','participant_name','short_name','display_name','athlete_name','known_name','label','title'];
  for (const k of keys) if (obj[k] && typeof obj[k] === 'string' && obj[k].trim().length > 1) return obj[k].trim();
  if (obj.firstname || obj.first_name) {
    const full = `${obj.firstname||obj.first_name||''} ${obj.lastname||obj.last_name||''}`.trim();
    if (full.length > 1) return full;
  }
  return null;
}

const POS_MAP = {GK:'GK',G:'GK',CB:'CB',LB:'LB',RB:'RB',LWB:'LWB',RWB:'RWB',DC:'CB',DL:'LB',DR:'RB',WBL:'LWB',WBR:'RWB',CDM:'CDM',CM:'CM',CAM:'CAM',AM:'CAM',LM:'LM',RM:'RM',DM:'CDM',MC:'CM',ML:'LM',MR:'RM',AMC:'CAM',AML:'LW',AMR:'RW',LW:'LW',RW:'RW',ST:'ST',CF:'CF',SS:'CF',FW:'ST',FC:'CF',SC:'ST',D:'DEF',M:'MID',F:'FWD',A:'FWD'};
function resolvePos(p) {
  const c = [p.position_name,p.detailed_position,p.specific_position,p.role_name,p.player_position,p.pos_name,p.player?.position_name,p.player?.pos,p.player?.position,p.position,p.pos,p.role];
  for (const v of c) if (v && typeof v === 'string') { const m = POS_MAP[v.trim()]||POS_MAP[v.trim().toUpperCase()]; if (m) return m; if (v.trim().length > 1 && v.trim().length <= 5) return v.trim(); }
  return '';
}
function posCategory(pos) {
  if (!pos) return '';
  const u = pos.toUpperCase();
  if (u==='GK') return 'GK';
  if (['CB','LB','RB','LWB','RWB','DEF'].includes(u)) return 'DEF';
  if (['CDM','CM','CAM','LM','RM','MID'].includes(u)) return 'MID';
  if (['ST','CF','LW','RW','FWD'].includes(u)) return 'FWD';
  return '';
}

function getMatchMinute(m) {
  for (const v of [m.match_time?.current_minute,m.timer?.elapsed,m.minute,m.elapsed,m.live_minute,m.current_minute,m.time_elapsed,m.match_minute]) {
    if (v != null) { const n = parseInt(v); if (!isNaN(n) && n > 0) return n; }
  }
  if (m.status && typeof m.status === 'string') { const n = parseInt(m.status); if (!isNaN(n) && n > 0 && n <= 120) return n; }
  return 0;
}
function getMatchState(m) {
  const s = (m.status||m.state||m.match_status||'').toUpperCase().trim();
  if (['LIVE','IN_PLAY','INPLAY','PLAYING','1H','2H','HT','HALF_TIME','BREAK','PEN_LIVE','AET_LIVE','1ST_HALF','2ND_HALF','HALFTIME','INPROGRESS'].includes(s)) return 'LIVE';
  if (['FT','FINISHED','FULL_TIME','COMPLETE','AET','PEN','AFTER_PEN','FULLTIME','ENDED','CLOSED'].includes(s)) return 'FINISHED';
  if (getMatchMinute(m) > 0) return 'LIVE';
  return 'UPCOMING';
}
function getMatchTimestamp(m) {
  for (const f of ['start_time','date','start_date','datetime','kickoff','scheduled','timestamp','start','kickoff_time','scheduled_time','event_date','fixture_date','game_date']) {
    const v = m[f];
    if (v) { if (typeof v === 'number') return v > 1e12 ? v : v*1000; const d = new Date(v); if (!isNaN(d.getTime())) return d.getTime(); }
  }
  if (m.time?.starting_at) { const d = new Date(m.time.starting_at); if (!isNaN(d)) return d.getTime(); }
  return 0;
}
function getSmartMinute(m) {
  const api = getMatchMinute(m);
  if (api <= 1) {
    const ts = getMatchTimestamp(m);
    if (ts > 0) {
      const el = Math.floor((Date.now() - ts) / 60000);
      if (el > 1 && el <= 120) return Math.min(el > 45 ? 45 + Math.max(0, el - 60) : el, 120);
    }
  }
  return api;
}
function formatTime(ts) {
  const d = new Date(ts);
  let h = d.getHours(); const ap = h >= 12 ? 'PM' : 'AM'; h = h%12||12;
  return `${h}:${d.getMinutes().toString().padStart(2,'0')} ${ap}`;
}
function getDayLabel(ts) {
  const now = new Date(), t = new Date(ts);
  [now,t].forEach(x => x.setHours(0,0,0,0));
  const diff = Math.round((t-now)/(864e5));
  if (diff===0) return 'Today'; if (diff===1) return 'Tmrw';
  if (diff>1&&diff<=6) return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][t.getDay()];
  return t.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}
function getCountdown(ts) {
  const ms = ts - Date.now(); if (ms <= 0) return null;
  const m = Math.floor(ms/60000); if (m < 60) return `${m}m`;
  const h = Math.floor(ms/3600000); if (h < 6) return `${h}h`;
  return null;
}
function getTeamName(m, side) {
  const t = side==='home' ? m.home_team : m.away_team;
  return (typeof t === 'string' ? t : t?.name) || (side==='home'?'Home':'Away');
}
function getScore(m, side) {
  return m[`${side}_score`] ?? 0;
}

function getTeamForm(teamName) {
  const matches = [...allMatches].filter(m => {
    const h = getTeamName(m,'home'), a = getTeamName(m,'away');
    return (h===teamName||a===teamName) && getMatchState(m)==='FINISHED';
  }).sort((a,b) => getMatchTimestamp(b)-getMatchTimestamp(a)).slice(0,5);
  return matches.map(m => {
    const isHome = getTeamName(m,'home')===teamName;
    const gs = getScore(m, isHome?'home':'away'), gc = getScore(m, isHome?'away':'home');
    if (gs > gc) return 'W'; if (gs < gc) return 'L'; return 'D';
  });
}
function renderForm(form) {
  return form.map(r => `<div class="form-box ${r}" title="${r}"></div>`).join('');
}
function renderFormSF(form) {
  return form.map(r => `<span class="sf-box sf-${r}">${r}</span>`).join('');
}

// ═══════════════════════════════════════════════════════
//  VIEW SWITCHING
// ═══════════════════════════════════════════════════════
function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  btn.classList.add('active');
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
}

// ═══════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════
function renderSidebar(filter='') {
  const q = filter.toLowerCase().trim();
  const filtered = q ? allLeagues.filter(l => l.name.toLowerCase().includes(q)) : allLeagues;
  document.getElementById('league-count').textContent = filtered.length;
  let html = '';
  if (!q||'all matches'.includes(q)) {
    const totalLive = allMatches.filter(m => getMatchState(m)==='LIVE').length;
    html += `<div class="league-item${selectedLeague===null?' active':''}" onclick="selectLeague(null)">
      <span>📋 All Matches</span>
      <span style="display:flex;align-items:center;gap:6px">
        ${totalLive>0?'<span class="live-badge"></span>':''}
        <span class="cnt-badge">${allMatches.length}</span>
      </span></div>`;
  }
  filtered.forEach(l => {
    const a = selectedLeague===l.name;
    html += `<div class="league-item${l.hasData?'':' no-data'}${a?' active':''}" onclick="selectLeague('${escJ(l.name)}')">
      <span>${esc(l.name)}</span>
      <span style="display:flex;align-items:center;gap:6px">
        ${l.live>0?'<span class="live-badge"></span>':''}
        <span class="cnt-badge">${l.count}</span>
      </span></div>`;
  });
  document.getElementById('sb-list').innerHTML = html || '<div style="padding:14px;color:#444;text-align:center;font-size:0.8rem">No leagues</div>';
}
function filterLeagues() { renderSidebar(document.getElementById('league-search').value); }
function selectLeague(name) {
  selectedLeague = name;
  renderSidebar(document.getElementById('league-search').value);
  renderMatchesView();
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

// ═══════════════════════════════════════════════════════
//  MATCH CARD RENDERING
// ═══════════════════════════════════════════════════════
function renderMatchCard(m) {
  const state = getMatchState(m);
  const hn = esc(getTeamName(m,'home')), an = esc(getTeamName(m,'away'));
  const hnR = getTeamName(m,'home').replace(/"/g,"'"), anR = getTeamName(m,'away').replace(/"/g,"'");
  const ts = getMatchTimestamp(m);
  let scoreHTML='', statusHTML='';

  if (state==='LIVE') {
    const hs = getScore(m,'home'), as = getScore(m,'away');
    scoreHTML = `<span class="score-main live">${hs}-${as}</span>`;
    const smartMin = getSmartMinute(m);
    const prev = liveTimers.get(m.id);
    if (!prev) liveTimers.set(m.id, {minute:smartMin, timestamp:Date.now()});
    else if (smartMin > prev.minute) liveTimers.set(m.id, {minute:smartMin, timestamp:Date.now()});
    statusHTML = `<span class="min-badge" data-mid="${m.id}">0'</span>`;
  } else if (state==='UPCOMING') {
    const cd = ts ? getCountdown(ts) : null;
    const dayStr = ts ? getDayLabel(ts) : '';
    const timeStr = ts ? formatTime(ts) : 'TBA';
    if (cd) scoreHTML = `<span class="score-main date countdown" data-ts="${ts}">${cd}</span>`;
    else scoreHTML = `<span class="score-main date">${dayStr} ${timeStr}</span>`;
    liveTimers.delete(m.id);
  } else {
    scoreHTML = `<span class="score-main">${getScore(m,'home')}-${getScore(m,'away')}</span>`;
    statusHTML = `<span class="min-badge ft">FT</span>`;
    liveTimers.delete(m.id);
  }

  const starred = starredSet.has(m.id);
  const hForm = renderForm(getTeamForm(getTeamName(m,'home')));
  const aForm = renderForm(getTeamForm(getTeamName(m,'away')));

  return `<div class="match-card" onclick='openMatch(${m.id},"${hnR}","${anR}")'>
    <div><div class="match-team home">${hn}</div><div class="form-row" style="justify-content:flex-end">${hForm}</div></div>
    <div class="score-box">${scoreHTML}${statusHTML}</div>
    <div><div class="match-team away">${an}</div><div class="form-row">${aForm}</div></div>
    <button class="star-btn ${starred?'on':''}" data-mid="${m.id}" onclick="toggleStar(${m.id},event)">★</button>
  </div>`;
}

function renderMatchesView() {
  const matches = selectedLeague === null ? allMatches : (leagueMap.get(selectedLeague)||[]);
  const el = document.getElementById('matches-content');
  if (!matches.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">⚽</div>No matches available</div>'; return; }
  if (selectedLeague === null) {
    const groups = {};
    matches.forEach(m => {
      const n = m.league?.name||m.league||m.competition?.name||m.tournament?.name||'Other';
      if (!groups[n]) groups[n] = [];
      groups[n].push(m);
    });
    const sorted = Object.entries(groups).sort(([,a],[,b]) => {
      const al=a.filter(m=>getMatchState(m)==='LIVE').length, bl=b.filter(m=>getMatchState(m)==='LIVE').length;
      return bl-al || 0;
    });
    el.innerHTML = sorted.map(([league, ms]) => {
      const liveCount = ms.filter(m=>getMatchState(m)==='LIVE').length;
      ms.sort((a,b) => {
        const as=getMatchState(a)==='LIVE'?2:getMatchState(a)==='UPCOMING'?1:0;
        const bs=getMatchState(b)==='LIVE'?2:getMatchState(b)==='UPCOMING'?1:0;
        if (as!==bs) return bs-as;
        return getMatchTimestamp(a)-getMatchTimestamp(b);
      });
      return `<div class="league-group">
        <div class="league-title" onclick="selectLeague('${escJ(league)}')">
          ${liveCount>0?'<span class="live-badge"></span>':''} ${esc(league)}
          <span style="margin-left:auto;font-size:0.68rem;color:#444">${ms.length} matches</span>
        </div>${ms.map(renderMatchCard).join('')}</div>`;
    }).join('');
  } else {
    const live = matches.filter(m=>getMatchState(m)==='LIVE');
    const up = matches.filter(m=>getMatchState(m)==='UPCOMING').sort((a,b)=>getMatchTimestamp(a)-getMatchTimestamp(b));
    const fin = matches.filter(m=>getMatchState(m)==='FINISHED').sort((a,b)=>getMatchTimestamp(b)-getMatchTimestamp(a));
    let html = `<div class="league-group"><div class="league-title">${esc(selectedLeague)} <span style="margin-left:auto;font-size:0.68rem;color:#444">${matches.length}</span></div>`;
    if (live.length) html += `<div class="section-lbl live">🔴 Live Now</div>${live.map(renderMatchCard).join('')}`;
    if (up.length) html += `<div class="section-lbl upcoming">📅 Upcoming</div>${up.map(renderMatchCard).join('')}`;
    if (fin.length) html += `<div class="section-lbl">✅ Results</div>${fin.map(renderMatchCard).join('')}`;
    html += '</div>';
    el.innerHTML = html;
  }
  starredSet.forEach(id => { const s=document.querySelector(`.star-btn[data-mid="${id}"]`); if(s) s.classList.add('on'); });
}

// ═══════════════════════════════════════════════════════
//  LIVE TIMER
// ═══════════════════════════════════════════════════════
function tickClocks() {
  document.querySelectorAll('[data-mid]').forEach(el => {
    if (!el.classList.contains('min-badge')) return;
    const id = parseInt(el.dataset.mid); const t = liveTimers.get(id);
    if (!t) return;
    const el_secs = (Date.now()-t.timestamp)/1000;
    const total = t.minute*60 + el_secs;
    const m = Math.floor(total/60), s = Math.floor(total%60);
    el.textContent = `${m}:${s.toString().padStart(2,'0')}'`;
  });
  const mc = document.getElementById('m-clock');
  if (mc && currentModalId && liveTimers.has(currentModalId)) {
    const t = liveTimers.get(currentModalId);
    const el_secs = (Date.now()-t.timestamp)/1000;
    const total = t.minute*60 + el_secs;
    mc.textContent = `⏱ Live ${Math.floor(total/60)}:${Math.floor(total%60).toString().padStart(2,'0')}`;
  }
  document.querySelectorAll('.countdown[data-ts]').forEach(el => {
    const ts = parseInt(el.dataset.ts); if (!ts) return;
    const cd = getCountdown(ts);
    if (cd) el.textContent = cd;
    else { const d=new Date(ts); el.textContent=`${getDayLabel(ts)} ${formatTime(ts)}`; el.classList.remove('countdown'); delete el.dataset.ts; }
  });
}
setInterval(tickClocks, 250);

function toggleStar(id, e) {
  e.stopPropagation();
  if (starredSet.has(id)) starredSet.delete(id); else starredSet.add(id);
  localStorage.setItem('ps_starred', JSON.stringify([...starredSet]));
  document.querySelectorAll(`.star-btn[data-mid="${id}"]`).forEach(b => b.classList.toggle('on', starredSet.has(id)));
}

async function openMatch(id, home, away) {
  currentModalId = id; currentModalHome = home; currentModalAway = away;
  document.getElementById('modal').style.display = 'block';
  document.getElementById('m-title').textContent = `${home} vs ${away}`;
  document.getElementById('m-xg').textContent = '';
  document.getElementById('m-meta').innerHTML = '';
  document.getElementById('m-clock').textContent = '';
  document.getElementById('m-prob').innerHTML = '';
  document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
  document.querySelectorAll('#modal-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('t-timeline').style.display = 'block';
  document.querySelector('#modal-tabs .tab-btn').classList.add('active');
  // Always show absentees tab
  document.getElementById('tab-unavail-btn').style.display = 'inline-block';

  try {
    const [evRes, predRes, v2LineupRes] = await Promise.allSettled([
      fetch(`${API}${id}/?full=true`, {headers:HDRS()}),
      fetch(`${API_PRED}${id}/`, {headers:HDRS()}),
      fetch(`${API_V2}events/${id}/lineups/`, {headers:HDRS()})
    ]);
    const evData = evRes.status==='fulfilled' ? await evRes.value.json() : null;
    const m = evData?.data || evData || {};
    currentModalMatch = m;
    let pred = null; if (predRes.status==='fulfilled' && predRes.value.ok) pred = await predRes.value.json();
    let v2Lineups = null; if (v2LineupRes.status==='fulfilled' && v2LineupRes.value.ok) v2Lineups = await v2LineupRes.value.json();
    populateModal(m, home, away, pred, v2Lineups);
  } catch(err) {
    document.getElementById('t-timeline').innerHTML = '<div class="empty">Failed to load match data</div>';
  }
}

function populateModal(m, home, away, pred, v2Lineups) {
  const state = getMatchState(m);
  const hxg = m.home_xg_live||m.home_xg||m.stats?.home?.xg||m.live_stats?.home?.xg||0;
  const axg = m.away_xg_live||m.away_xg||m.stats?.away?.xg||m.live_stats?.away?.xg||0;
  document.getElementById('m-xg').textContent = `xG: ${parseFloat(hxg).toFixed(2)} — ${parseFloat(axg).toFixed(2)}`;
  const stadium = m.venue?.name||m.venue||m.stadium||m.location||'';
  const ref = m.referee?.name||m.referee||m.official||'';
  const att = m.attendance||m.venue?.attendance||'';
  const metas = [stadium&&`🏟 ${stadium}`, ref&&`👨‍⚖️ ${ref}`, att&&`👥 ${parseInt(att).toLocaleString()}`].filter(Boolean);
  document.getElementById('m-meta').innerHTML = metas.map(s=>`<span>${esc(s)}</span>`).join('');
  if (state==='LIVE') {
    const sm = getSmartMinute(m); const prev = liveTimers.get(m.id);
    if (!prev) liveTimers.set(m.id, {minute:sm, timestamp:Date.now()});
    else if (sm > prev.minute) liveTimers.set(m.id, {minute:sm, timestamp:Date.now()});

  populateTimeline(m, home, away);

  populateStats(m, home, away);
  populateMomentum(m, home, away);
  populateShotMap(m, home, away);
  populateInfo(m, home, away);
  populateUnavail(m, pred, v2Lineups, home, away);
}

// ── TIMELINE ──
function populateTimeline(m, home, away) {
  const el = document.getElementById('t-timeline'); el.innerHTML = '';
  let events = m.incidents||m.events||m.match_events||m.timeline||m.event_details||[];
  if (!Array.isArray(events) && events?.data) events = events.data;
  if (!Array.isArray(events)) events = [];
  if (!events.length) { el.innerHTML = '<div class="empty" style="padding:30px">No events recorded</div>'; return; }
  events.sort((a,b) => (parseInt(b.minute)||0)-(parseInt(a.minute)||0)).forEach(e => {
    const rt = (e.type||e.incident_type||e.event_type||e.kind||'').toLowerCase();
    const isHome = e.is_home||e.team==='home'||e.team==='local'||e.team_id===(m.home_team_id||m.home_team?.id);
    const side = isHome ? home : away;
    const pName = resolveName(e.player)||resolveName(e.scorer)||e.player_name||'?';
    const pid = e.player_id||e.player?.id||e.scorer?.id;
    let icon='•', detail='';
    if (rt.includes('goal')&&!rt.includes('miss')&&!rt.includes('saved')) {
      icon='⚽'; const og = rt.includes('own')||e.own_goal;
      const pen = rt.includes('pen')||e.penalty||e.is_penalty;
      const asst = resolveName(e.assist)||resolveName(e.assist_player)||resolveName(e.assistPlayer)||'';
      detail = `<span class="player-click" data-pid="${pid}">${esc(pName)}</span>
        ${og?'<span style="color:var(--red);font-weight:700">(OG)</span>':pen?'<span style="color:var(--yellow);font-weight:700">(Pen)</span>':'<span style="color:var(--g);font-weight:700">⚽</span>'}
        ${asst?`<br><span style="color:#555;font-size:0.72rem">▶ ${esc(asst)}</span>`:''}`;
    } else if (rt.includes('card')||rt.includes('yellow')||rt.includes('red')) {
      const red = rt.includes('red')||e.card_type==='red';
      icon = red?'🟥':'🟨';
      detail = `<span class="player-click" data-pid="${pid}">${esc(pName)}</span>`;
    } else if (rt.includes('sub')) {
      icon='🔄';
      const pIn = resolveName(e.player_in)||resolveName(e.in)||resolveName(e.playerIn)||'?';
      const pOut = resolveName(e.player_out)||resolveName(e.out)||pName;
      detail = `<span style="color:var(--g)">▲ ${esc(pIn)}</span> <span style="color:var(--red)">▼ ${esc(pOut)}</span>`;
    } else if (rt.includes('pen')&&(rt.includes('miss')||rt.includes('save')||e.missed||e.saved)) {
      icon='❌'; detail = `<span class="player-click" data-pid="${pid}">${esc(pName)}</span> <span style="color:var(--red)">Penalty missed/saved</span>`;
    } else if (rt.includes('var')) {
      icon='📺'; detail='<span style="color:#888">VAR Review</span>';
    } else {
      detail = `<span class="player-click" data-pid="${pid}">${esc(pName)}</span> <span style="color:#555">${esc(rt)}</span>`;
    }
    const min = e.minute||e.match_minute||e.time||'?';
    el.innerHTML += `<div class="event-row"><div class="event-min">${min}'</div><div class="event-body"><div class="event-team-lbl">${esc(side)}</div>${icon} ${detail}</div></div>`;
  });
}

// ── LINEUPS (with predicted XI fallback) ──
function populateLineups(m, home, away, pred, v2Lineups) {
  // Try v2 lineups first, then v1 lineups, then predicted
  let hPlayers=[], aPlayers=[], hSubs=[], aSubs=[], hFormation='', aFormation='', hMgr='', aMgr='';

  if (v2Lineups?.lineups) {
    const hl = v2Lineups.lineups.home, al = v2Lineups.lineups.away;
    hPlayers = hl?.players || [];
    aPlayers = al?.players || [];
    hSubs = hl?.substitutes || [];
    aSubs = al?.substitutes || [];
    hFormation = hl?.formation || '';
    aFormation = al?.formation || '';
  }

  // Fallback to v1 lineups
  if (!hPlayers.length && !aPlayers.length) {
    let ls = m.lineups||m.starting_xi||m.teams||m.live_stats?.lineups;
    if (ls) {
      if (Array.isArray(ls)) { hPlayers=ls.filter(p=>p.is_home||p.team==='home'); aPlayers=ls.filter(p=>!p.is_home&&p.team!=='home'); }
      else {
        const hS=ls.home||ls.local||ls[0], aS=ls.away||ls.visitor||ls[1];
        hPlayers=hS?.players||hS?.starting_xi||hS?.lineup||(Array.isArray(hS)?hS:[]);
        aPlayers=aS?.players||aS?.starting_xi||aS?.lineup||(Array.isArray(aS)?aS:[]);
        hFormation=hS?.formation||ls.home_formation||''; aFormation=aS?.formation||ls.away_formation||'';
        hMgr=resolveName(hS?.manager)||resolveName(hS?.coach)||''; aMgr=resolveName(aS?.manager)||resolveName(aS?.coach)||'';
        hSubs=hS?.substitutes||hS?.bench||[]; aSubs=aS?.substitutes||aS?.bench||[];
      }
    }
  }
  hFormation=hFormation||m.home_formation||''; aFormation=aFormation||m.away_formation||'';

  // Use predicted lineup if no real data
  const predHome = pred?.lineups?.home;
  const predAway = pred?.lineups?.away;
  renderSquadCol('home-side', home, hPlayers, hFormation, hMgr, hSubs, predHome);
  renderSquadCol('away-side', away, aPlayers, aFormation, aMgr, aSubs, predAway);
}

function renderSquadCol(id, name, players, formation, mgr, subs, predicted) {
  const el = document.getElementById(id);
  let html = `<div class="team-col-name">${esc(name)}</div>`;
  if (formation) html += `<span class="form-tag">▣ ${esc(formation)}</span>`;
  if (mgr) html += `<div class="mgr-lbl">🧑‍💼 ${esc(mgr)}</div>`;

  if (predicted && (!players || !players.length)) {
    // Show predicted lineup
    if (predicted.predicted_formation) html += `<span class="form-tag" style="background:#2a2a14;color:var(--yellow);border-color:#3a3a1a">🤖 ${esc(predicted.predicted_formation)}</span>`;
    if (predicted.confidence != null) html += `<div style="font-size:0.6rem;color:#555;margin:4px 0">Confidence: ${(predicted.confidence*100).toFixed(0)}%</div>`;
    html += `<div style="font-size:0.65rem;color:var(--yellow);margin:6px 0">🤖 AI Predicted XI</div>`;
    if (predicted.starters?.length) {
      predicted.starters.forEach(p => {
        const pos = p.position||'?', cat = posCategory(pos);
        const score = p.ai_score != null ? `<span class="ai-score">${(p.ai_score*100).toFixed(0)}%</span>` : '';
        html += `<div class="player-row" style="cursor:default"><span>${esc(p.name||'?')}${score}</span><span class="pos-pill pos-${cat}">${pos}</span></div>`;
      });
    }
    if (predicted.substitutes?.length) {
      html += `<div class="subs-hdr">Predicted Bench</div><div>`;
      predicted.substitutes.forEach(p => {
        html += `<div class="sub-chip">${esc(p.name||'?')}</div>`;
      });
      html += '</div>';
    }
  } else if (players?.length) {
    players.forEach(p => {
      const pn = resolveName(p)||'?', pos = resolvePos(p), cat = posCategory(pos);
      const num = p.jersey_number||p.shirt_number||p.number||'';
      const pid = p.player_id||p.id;
      html += `<div class="player-row" data-pid="${pid}"><span>${num?`<span style="color:#444;font-family:var(--font-mono);font-size:0.72rem;margin-right:4px">${num}</span>`:''}${esc(pn)}</span><span class="pos-pill pos-${cat}">${pos||'?'}</span></div>`;
    });
    if (subs?.length) {
      html += `<div class="subs-hdr">Bench</div><div>`;
      subs.forEach(p => {
        const pn = resolveName(p)||'?', pos = resolvePos(p);
        html += `<div class="sub-chip">${pos?`<span style="color:#555">${pos}</span>`:''}${esc(pn)}</div>`;
      });
      html += '</div>';
    }
    // Also show predicted if available alongside real
    if (predicted?.starters?.length) {
      html += `<div class="subs-hdr" style="color:var(--yellow)">🤖 Predicted (AI)</div><div>`;
      html += `<div style="font-size:0.6rem;color:#555;margin-bottom:4px">Formation: ${esc(predicted.predicted_formation||'?')} · Confidence: ${predicted.confidence!=null?(predicted.confidence*100).toFixed(0)+'%':'?'}</div>`;
      predicted.starters.slice(0,5).forEach(p => {
        html += `<div class="sub-chip"><span style="color:var(--yellow)">🤖</span> ${esc(p.name||'?')} <span style="color:#555">${esc(p.position||'')}</span></div>`;
      });
      html += '</div>';
    }
  } else {
    html += '<div class="empty" style="padding:14px;font-size:0.8rem">Not available</div>';
  }
  el.innerHTML = html;
}

// ── STATS ──
function populateStats(m, home, away) {
  const el = document.getElementById('t-stats');
  const s = m.live_stats||m.statistics||m.stats||{};
  const h = s.home||s.home_team||{}, a = s.away||s.away_team||{};
  function statBar(label, hv, av, fmt='num') {
    const hn = parseFloat(hv)||0, an = parseFloat(av)||0;
    const tot = hn+an||1;
    const hw = ((hn/tot)*100).toFixed(1), aw = ((an/tot)*100).toFixed(1);
    const hDisp = fmt==='pct' ? `${hn}%` : hn;
    const aDisp = fmt==='pct' ? `${an}%` : an;
    return `<div class="stat-bar-row">
      <div class="stat-bar-labels"><span style="color:var(--g);font-weight:700">${hDisp}</span><span class="stat-bar-label">${label}</span><span style="color:var(--red);font-weight:700">${aDisp}</span></div>
      <div class="stat-bar-track"><div class="stat-bar-home" style="width:${hw}%"></div><div class="stat-bar-away" style="width:${aw}%"></div></div></div>`;
  }
  el.innerHTML = `<div style="padding:4px 0">
    ${statBar('Possession', h.ball_possession||h.possession||50, a.ball_possession||a.possession||50, 'pct')}
    ${statBar('Shots', h.total_shots||h.shots||0, a.total_shots||a.shots||0)}
    ${statBar('On Target', h.shots_on_target||0, a.shots_on_target||0)}
    ${statBar('Corners', h.corner_kicks||h.corners||0, a.corner_kicks||a.corners||0)}
    ${statBar('Fouls', h.fouls||0, a.fouls||0)}
    ${statBar('Yellow Cards', h.yellow_cards||0, a.yellow_cards||0)}
    ${statBar('Offsides', h.offsides||0, a.offsides||0)}
    ${statBar('Passes', h.passes||h.total_passes||0, a.passes||a.total_passes||0)}
    ${statBar('Tackles', h.tackles||0, a.tackles||0)}
    ${statBar('xG', h.xg||h.expected_goals||0, a.xg||a.expected_goals||0)}
  </div>`;
}

// ── MOMENTUM ──
function populateMomentum(m, home, away) {
  const canvas = document.getElementById('momentum-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1;
  for (let i=0;i<=9;i++) { ctx.beginPath(); ctx.moveTo(i/9*W,0); ctx.lineTo(i/9*W,H); ctx.stroke(); }
  for (let i=0;i<=4;i++) { ctx.beginPath(); ctx.moveTo(0,i/4*H); ctx.lineTo(W,i/4*H); ctx.stroke(); }
  ctx.strokeStyle='#2a2a2a'; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#2a2a2a'; ctx.font='10px var(--font-head)'; ctx.textAlign='center';
  ctx.fillText('HT', W/2, H-4);

  const timeline = m.momentum||m.possession_timeline||m.live_stats?.momentum||[];
  if (timeline.length > 1) {
    const drawLine = (data, color) => {
      ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.lineJoin='round';
      ctx.beginPath();
      data.forEach((v,i) => {
        const x = (i/(data.length-1))*W, y = H - (parseFloat(v)/100)*H;
        i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      });
      ctx.stroke();
      ctx.shadowColor=color; ctx.shadowBlur=6; ctx.stroke(); ctx.shadowBlur=0;
    };
    const hData = timeline.map(t=>t.home||t.home_possession||50);
    const aData = timeline.map(t=>t.away||t.away_possession||50);
    drawLine(hData, '#00e676');
    drawLine(aData, '#ff4444');
  } else {
    ctx.fillStyle='#333'; ctx.font='13px var(--font-head)'; ctx.textAlign='center';
    ctx.fillText('Live momentum data not available', W/2, H/2);
  }
  ctx.fillStyle='#00e676'; ctx.font='bold 11px var(--font-head)'; ctx.textAlign='left';
  ctx.fillText(home, 8, 16);
  ctx.fillStyle='#ff4444'; ctx.textAlign='right';
  ctx.fillText(away, W-8, 16);
}

// ── SHOT MAP ──
function populateShotMap(m, home, away) {
  const canvas = document.getElementById('shot-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  drawPitch(ctx,W,H);
  const shots = m.shots||m.shot_data||m.xg_shots||m.live_stats?.shots||m.shotmap||[];
  if (shots.length) {
    shots.forEach(s => {
      const isHome = s.is_home||s.team==='home'||s.home===true;
      const xPct = (s.pos?.x||s.x||s.position_x||50)/100;
      const yPct = (s.pos?.y||s.y||s.position_y||50)/100;
      const x = isHome ? xPct*W*0.45 + W*0.55 : xPct*W*0.45;
      const y = yPct*H;
      const type = (s.type||s.outcome||s.result||'').toLowerCase();
      const isGoal = type.includes('goal');
      const onTarget = type.includes('on')||type.includes('save');
      const r = 7;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle = isGoal ? 'rgba(0,230,118,0.85)' : onTarget ? 'rgba(79,195,247,0.7)' : type.includes('block') ? 'rgba(100,100,100,0.6)' : 'rgba(255,68,68,0.6)';
      ctx.fill();
      if (isGoal) { ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); }
    });
  } else {
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.font='14px var(--font-head)'; ctx.textAlign='center';
    ctx.fillText('Shot data not available', W/2, H/2+20);
    const demoShots = [
      {x:0.72,y:0.45,type:'goal',home:true},{x:0.65,y:0.38,type:'on',home:true},{x:0.78,y:0.6,type:'off',home:true},
      {x:0.28,y:0.55,type:'on',home:false},{x:0.2,y:0.42,type:'block',home:false},{x:0.22,y:0.65,type:'goal',home:false}
    ];
    demoShots.forEach(s => {
      const x = s.home ? (0.55+s.x*0.4)*W : s.x*0.45*W, y = s.y*H;
      const isGoal = s.type==='goal';
      ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2);
      ctx.fillStyle = isGoal ? 'rgba(0,230,118,0.7)' : s.type==='on' ? 'rgba(79,195,247,0.6)' : s.type==='block' ? 'rgba(120,120,120,0.5)' : 'rgba(255,68,68,0.5)';
      ctx.fill();
      if (isGoal) { ctx.globalAlpha=0.4; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke(); ctx.globalAlpha=1; }
    });
    ctx.fillStyle='rgba(255,200,0,0.6)'; ctx.font='11px var(--font-head)';
    ctx.fillText('(Demo visualization)', W/2, H-10);
  }
  ctx.fillStyle='rgba(0,230,118,0.8)'; ctx.font='bold 11px var(--font-head)'; ctx.textAlign='center';
  ctx.fillText(home, W*0.75, 16);
  ctx.fillStyle='rgba(255,68,68,0.8)';
  ctx.fillText(away, W*0.25, 16);
}

function drawPitch(ctx,W,H) {
  ctx.fillStyle='#0a1a0a'; ctx.fillRect(0,0,W,H);
  for (let i=0;i<8;i++) { ctx.fillStyle = i%2===0 ? '#0a1a0a' : '#0c1c0c'; ctx.fillRect(i*W/8,0,W/8,H); }
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5;
  ctx.strokeRect(8,8,W-16,H-16);
  ctx.beginPath(); ctx.moveTo(W/2,8); ctx.lineTo(W/2,H-8); ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2,H/2,H/6,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2,H/2,2,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fill();
  const bW=W*0.16, bH=H*0.55; ctx.strokeRect(8, (H-bH)/2, bW, bH); ctx.strokeRect(8,(H-H*0.2)/2,8,H*0.2);
  ctx.strokeRect(W-8-bW,(H-bH)/2,bW,bH); ctx.strokeRect(W-8,(H-H*0.2)/2,8,H*0.2);
}

// ── ABSENTEES (always visible, merged from v1 + v2 + predicted) ──
function populateUnavail(m, pred, v2Lineups, home, away) {
  const el = document.getElementById('t-unavail');
  let allUnavail = { home: [], away: [] };

  // Source 1: v1 events detail (unavailable_players)
  if (m.unavailable_players) {
    if (Array.isArray(m.unavailable_players.home)) allUnavail.home.push(...m.unavailable_players.home.map(u => ({name:resolveName(u)||u.name||'?', reason:u.reason||u.injury||'', status:u.status||'injured', return_date:u.expected_return||u.return_date||''})));
    if (Array.isArray(m.unavailable_players.away)) allUnavail.away.push(...m.unavailable_players.away.map(u => ({name:resolveName(u)||u.name||'?', reason:u.reason||u.injury||'', status:u.status||'injured', return_date:u.expected_return||u.return_date||''})));
  }

  // Source 2: v2 lineups (unavailable_players)
  if (v2Lineups?.unavailable_players) {
    if (Array.isArray(v2Lineups.unavailable_players.home)) allUnavail.home.push(...v2Lineups.unavailable_players.home.map(u => ({name:u.name||'?', reason:u.reason||'', status:u.status||'injured', return_date:''})));
    if (Array.isArray(v2Lineups.unavailable_players.away)) allUnavail.away.push(...v2Lineups.unavailable_players.away.map(u => ({name:u.name||'?', reason:u.reason||'', status:u.status||'injured', return_date:''})));
  }

  // Source 3: predicted-lineup (unavailable)
  if (pred?.lineups?.home?.unavailable) allUnavail.home.push(...pred.lineups.home.unavailable.map(u => ({name:u.name||'?', reason:u.reason||'', status:'injured', return_date:''})));
  if (pred?.lineups?.away?.unavailable) allUnavail.away.push(...pred.lineups.away.unavailable.map(u => ({name:u.name||'?', reason:u.reason||'', status:'injured', return_date:''})));

  // Deduplicate by name
  const dedupe = (arr) => {
    const seen = new Set();
    return arr.filter(x => { const k = x.name.toLowerCase(); if (seen.has(k)) return false; seen.add(k); return true; });
  };
  allUnavail.home = dedupe(allUnavail.home);
  allUnavail.away = dedupe(allUnavail.away);

  const hasHome = allUnavail.home.length > 0;
  const hasAway = allUnavail.away.length > 0;

  if (!hasHome && !hasAway) {
    el.innerHTML = `<div class="info-card"><h4>⚕️ Absentees</h4><div style="display:flex;gap:20px">
      <div style="flex:1;text-align:center"><div style="font-weight:700;color:#aaa;margin-bottom:8px">${esc(home)}</div><div style="color:#444">✅ Full squad available</div></div>
      <div style="flex:1;text-align:center"><div style="font-weight:700;color:#aaa;margin-bottom:8px">${esc(away)}</div><div style="color:#444">✅ Full squad available</div></div>
    </div></div>`;
    return;
  }

  const renderUnavailList = (list, teamName) => {
    if (!list.length) return `<div style="flex:1;text-align:center"><div style="font-weight:700;color:#aaa;margin-bottom:8px">${esc(teamName)}</div><div style="color:#444">✅ Full squad available</div></div>`;
    return `<div style="flex:1"><div style="font-weight:700;color:#aaa;margin-bottom:8px">🚑 ${esc(teamName)}</div>
      ${list.map(u => `<div class="unavail-badge">
        <div class="unavail-name">${esc(u.name)}</div>
        <div class="unavail-meta">
          ${u.status?`<span class="badge ${u.status==='suspended'?'badge-r':u.status==='doubtful'?'badge-y':'badge-r'}">${esc(u.status)}</span>`:''}
          ${u.reason?`<span class="unavail-reason ${u.status==='suspended'?'unavail-susp':''}">${esc(u.reason)}</span>`:''}
          ${u.return_date?`<span class="unavail-return">⏳ ${esc(u.return_date)}</span>`:''}
        </div>
      </div>`).join('')}</div>`;
  };

  el.innerHTML = `<div class="info-card">
    <h4>⚕️ Absentees</h4>
    <div style="display:flex;gap:20px">
      ${renderUnavailList(allUnavail.home, home)}
      ${renderUnavailList(allUnavail.away, away)}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
//  PLAYER DEEP-DIVE (fixed with v2 API)
// ═══════════════════════════════════════════════════════
async function fetchPlayerDive(pid) {
  if (!pid || pid==='undefined') return;
  try {
    // Use v2 API for player detail + career stats
    const [detailRes, careerRes] = await Promise.allSettled([
      fetch(`${API_PLAYERS_V2}${pid}/`, {headers:HDRS()}),
      fetch(`${API_PLAYERS_V2}${pid}/career/`, {headers:HDRS()})
    ]);

    const detailData = detailRes.status==='fulfilled' ? await detailRes.value.json() : {};
    const careerData = careerRes.status==='fulfilled' ? await careerRes.value.json() : {};

    const p = detailData || {};
    const career = careerData?.seasons || [];

    // Aggregate career stats
    let totalMatches=0, totalGoals=0, totalAssists=0, totalMins=0;
    let totalYC=0, totalRC=0, totalRating=0, ratingCount=0;
    career.forEach(s => {
      totalMatches += s.matches||0;
      totalGoals += s.goals||0;
      totalAssists += s.assists||0;
      totalMins += s.minutes||0;
      if (s.avg_rating) { totalRating += s.avg_rating; ratingCount++; }
    });

    currentPlayerData = {
      _pid: pid,
      name: p.name||p.short_name||'Unknown',
      position: p.specific_position||p.position||'N/A',
      team: p.current_team_id||'',
      matches: totalMatches,
      goals: totalGoals,
      assists: totalAssists,
      minutes: totalMins,
      rating: ratingCount>0 ? (totalRating/ratingCount).toFixed(1) : 'N/A',
      photo: `https://sports.bzzoiro.com/img/players/${pid}/`
    };

    const name = currentPlayerData.name;
    const pos = currentPlayerData.position;
    document.getElementById('pp-img').src = currentPlayerData.photo;
    document.getElementById('pp-name').textContent = name;
    document.getElementById('pp-pos').textContent = `${pos}`;
    document.getElementById('pp-stats').innerHTML = `
      <div class="popup-stat"><b>${totalMatches}</b> Apps</div>
      <div class="popup-stat"><b>${totalGoals}</b> ⚽</div>
      <div class="popup-stat"><b>${totalAssists}</b> 🎯</div>
      <div class="popup-stat"><b>${totalMins}'</b> ⏱</div>
      <div class="popup-stat"><b>${currentPlayerData.rating}</b> ⭐</div>`;

    // Radar
    const canvas = document.getElementById('pp-radar');
    const maxMins = Math.max(totalMins, 1);
    const norm = [
      Math.min(totalMatches/50,1), Math.min(totalGoals/20,1), Math.min(totalAssists/15,1),
      Math.min(totalMins/maxMins,1), parseFloat(currentPlayerData.rating)/10||0.5, 0.5
    ];
    drawRadarChart(canvas, ['Apps','Goals','Assists','Mins','Rating','?'], norm, [0.5,0.5,0.5,0.5,0.5,0.5], '#00e676', 'transparent');
    document.getElementById('pp-compare-btn').textContent = compareSlot.length===0 ? 'Compare' : compareSlot.find(c=>c._pid===pid) ? '✓ Added' : compareSlot.length >= 2 ? 'Compare' : '+ Add';
    document.getElementById('player-popup').style.display = 'block';
  } catch(err) {
    console.error('Player fetch error:', err);
    toast('Failed to load player data', 'error');
  }
}

function drawRadarChart(canvas, labels, hNorm, aNorm, hColor, aColor) {
  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2, r=Math.min(W,H)/2-24;
  const N=labels.length;
  ctx.clearRect(0,0,W,H);
  for (let ri=1;ri<=4;ri++) {
    ctx.beginPath();
    for (let i=0;i<N;i++) {
      const angle = (Math.PI*2/N)*i - Math.PI/2;
      const x = cx + (r*ri/4)*Math.cos(angle), y = cy + (r*ri/4)*Math.sin(angle);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath(); ctx.strokeStyle='#1e1e1e'; ctx.lineWidth=1; ctx.stroke();
  }
  for (let i=0;i<N;i++) {
    const angle = (Math.PI*2/N)*i - Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*Math.cos(angle), cy+r*Math.sin(angle));
    ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1; ctx.stroke();
    const lx = cx+(r+14)*Math.cos(angle), ly = cy+(r+14)*Math.sin(angle);
    ctx.fillStyle='#555'; ctx.font='8px var(--font-head)'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(labels[i], lx, ly);
  }
  const drawPoly = (norm, color) => {
    ctx.beginPath();
    for (let i=0;i<N;i++) {
      const angle = (Math.PI*2/N)*i - Math.PI/2;
      const v = Math.min(Math.max(norm[i],0),1);
      const x = cx+r*v*Math.cos(angle), y = cy+r*v*Math.sin(angle);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.fillStyle = color.replace(')',',0.15)').replace('rgb','rgba').replace('#','rgba(').replace('rgba(00e676','rgba(0,230,118').replace('rgba(ff4444','rgba(255,68,68');
    ctx.fill(); ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
  };
  drawPoly(hNorm, hColor);
  if (aColor !== 'transparent') drawPoly(aNorm, aColor);
}

function addToCompare() {
  if (!currentPlayerData) return;
  if (compareSlot.find(c=>c._pid===currentPlayerData._pid)) { toast('Already added to compare'); return; }
  if (compareSlot.length >= 2) compareSlot.shift();
  compareSlot.push(currentPlayerData);
  toast(`${currentPlayerData.name} added to compare`);
  document.getElementById('pp-compare-btn').textContent = '✓ Added';
  if (compareSlot.length === 2) setTimeout(openCompare, 300);
}

function openCompare() {
  if (compareSlot.length < 2) { toast('Add 2 players to compare','error'); return; }
  const [p1,p2] = compareSlot;
  const n1=p1.name, n2=p2.name;
  const stats = [
    {key:'Appearances', v1:p1.matches, v2:p2.matches},
    {key:'Goals', v1:p1.goals, v2:p2.goals},
    {key:'Assists', v1:p1.assists, v2:p2.assists},
    {key:'Minutes', v1:p1.minutes, v2:p2.minutes},
    {key:'Rating', v1:p1.rating, v2:p2.rating}
  ];
  const rows = stats.map(s => {
    const v1=s.v1, v2=s.v2;
    const color1 = v1>v2?'color:var(--g)':v1<v2?'color:var(--red)':'';
    const color2 = v2>v1?'color:var(--g)':v2<v1?'color:var(--red)':'';
    return `<div class="compare-grid">
      <div class="compare-h" style="${color1}">${v1}</div>
      <div class="compare-label">${s.key}</div>
      <div class="compare-a" style="${color2}">${v2}</div>
    </div>`;
  }).join('');
  document.getElementById('compare-content').innerHTML = `
    <div class="compare-grid" style="margin-bottom:16px;font-weight:800;font-size:0.95rem">
      <div style="text-align:right;color:var(--g)">${esc(n1)}</div>
      <div style="text-align:center;color:#333">vs</div>
      <div style="text-align:left;color:var(--red)">${esc(n2)}</div>
    </div>
    ${rows}
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:center">
      <button class="btn-outline" onclick="compareSlot=[];closeCompare()">Clear & Close</button>
    </div>`;
  closePlayerPopup();
  document.getElementById('compare-modal').style.display = 'block';
}
function closeCompare() { document.getElementById('compare-modal').style.display='none'; }
function closePlayerPopup() { document.getElementById('player-popup').style.display='none'; }

document.addEventListener('click', e => {
  const pl = e.target.closest('[data-pid]');
  if (pl && pl.dataset.pid && pl.dataset.pid!=='undefined') {
    e.stopPropagation(); fetchPlayerDive(pl.dataset.pid);
  }
});

async function openTeamProfile(name) {
  document.getElementById('team-modal').style.display = 'block';
  document.getElementById('tm-name').textContent = name;
  const data = allTeamsMap.get(name) || {};
  document.getElementById('tm-meta').textContent = data.league || '';
  const form = getTeamForm(name);
  document.getElementById('tm-form').innerHTML = form.map(r =>
    `<span class="sf-box sf-${r}" style="padding:4px 10px;font-size:0.75rem;border-radius:6px">${r}</span>`
  ).join('');

  const matches = data.matches || allMatches.filter(m => getTeamName(m,'home')===name||getTeamName(m,'away')===name);
  let players = [];
  matches.forEach(m => {
    const isHome = getTeamName(m,'home')===name;
    const ls = m.lineups;
    if (ls) {
      const side = isHome ? (ls.home||ls.local) : (ls.away||ls.visitor);
      if (side?.players) {
        side.players.forEach(p => { const pn = resolveName(p); if (pn && !players.find(x=>x.name===pn)) players.push({name:pn,pos:resolvePos(p)||'?',id:p.player_id||p.id}); });
      }
    }
  });
  const squadEl = document.getElementById('tt-squad');
  squadEl.innerHTML = players.length
    ? `<div style="padding-top:10px"><div style="font-size:0.65rem;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">${players.length} players found</div><div class="squad-list">${players.map(p=>`<div class="squad-card" onclick="fetchPlayerDive(${p.id})"><div class="squad-name">${esc(p.name)}</div><div class="squad-pos">${esc(p.pos)}</div></div>`).join('')}</div></div>`
    : '<div class="empty" style="padding:20px">No lineup data available</div>';

  const statsEl = document.getElementById('tt-stats');
  const finMatches = matches.filter(m=>getMatchState(m)==='FINISHED');
  if (finMatches.length) {
    let gf=0,ga=0,cs=0,btts=0;
    finMatches.forEach(m => {
      const ih=getTeamName(m,'home')===name;
      const gs=getScore(m,ih?'home':'away'), gc=getScore(m,ih?'away':'home');
      gf+=gs; ga+=gc; if(gc===0)cs++; if(gs>0&&gc>0)btts++;
    });
    statsEl.innerHTML = `<div class="info-card" style="margin-top:10px">
      <h4>Season Statistics (${finMatches.length} matches)</h4>
      <div class="ref-row"><span class="ref-key">Goals scored</span><span class="ref-val">${gf} (${(gf/finMatches.length).toFixed(1)}/g)</span></div>
      <div class="ref-row"><span class="ref-key">Goals conceded</span><span class="ref-val">${ga} (${(ga/finMatches.length).toFixed(1)}/g)</span></div>
      <div class="ref-row"><span class="ref-key">Clean sheets</span><span class="ref-val">${cs}</span></div>
      <div class="ref-row"><span class="ref-key">Both teams scored</span><span class="ref-val">${btts}</span></div>
      <div class="ref-row"><span class="ref-key">Avg goals/game</span><span class="ref-val">${((gf+ga)/finMatches.length).toFixed(1)}</span></div>
    </div>`;
  } else { statsEl.innerHTML = '<div class="empty" style="padding:20px">No finished matches</div>'; }

  const resEl = document.getElementById('tt-results');
  const recent = matches.filter(m=>getMatchState(m)==='FINISHED').sort((a,b)=>getMatchTimestamp(b)-getMatchTimestamp(a)).slice(0,10);
  resEl.innerHTML = recent.length
    ? `<div style="padding-top:10px">${recent.map(m => {
        const ih=getTeamName(m,'home')===name;
        const hs=getScore(m,'home'),as=getScore(m,'away');
        const gs=ih?hs:as,gc=ih?as:hs;
        const r=gs>gc?'W':gs<gc?'L':'D';
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #141414;font-size:0.8rem">
          <span class="sf-box sf-${r}" style="padding:4px 8px;border-radius:5px;font-size:0.72rem;min-width:22px;text-align:center">${r}</span>
          <span style="flex:1;text-align:right">${esc(getTeamName(m,'home'))}</span>
          <span style="font-weight:700;color:var(--g);font-family:var(--font-mono)">${hs}-${as}</span>
          <span style="flex:1">${esc(getTeamName(m,'away'))}</span>
        </div>`;
      }).join('')}</div>`
    : '<div class="empty" style="padding:20px">No results yet</div>';
}

// ═══════════════════════════════════════════════════════
//  DATA LOADING
// ═══════════════════════════════════════════════════════
async function loadAllData() {
  try {
    const res = await fetch(API, {headers:HDRS()});
    const data = await res.json();
    const ms = data.results||data.data||data||[];
    allMatches = Array.isArray(ms) ? ms : [];
    leagueMap.clear(); allTeamsMap.clear();
    allMatches.forEach(m => {
      const ln = m.league?.name||m.league||m.competition?.name||m.tournament?.name||'Other';
      if (!leagueMap.has(ln)) leagueMap.set(ln, []);
      leagueMap.get(ln).push(m);
      ['home','away'].forEach(side => {
        const tn = getTeamName(m,side);
        if (!allTeamsMap.has(tn)) allTeamsMap.set(tn, {matches:[], league:ln});
        allTeamsMap.get(tn).matches.push(m);
      });
    });
    const names = new Set([...leagueMap.keys()]);
    try {
      const lr = await fetch(API_LEAGUES, {headers:HDRS()});
      const ld = await lr.json();
      (ld.results||ld.data||ld||[]).forEach(l => { const n=l.name||l.league_name||''; if(n) names.add(n); });
    } catch(e) {}
    allLeagues = [...names].map(name => ({
      name, count:(leagueMap.get(name)||[]).length,
      live:(leagueMap.get(name)||[]).filter(m=>getMatchState(m)==='LIVE').length,
      hasData:leagueMap.has(name)
    })).sort((a,b) => b.live-a.live || (b.hasData?1:0)-(a.hasData?1:0) || a.name.localeCompare(b.name));

    renderSidebar(document.getElementById('league-search').value);
    renderMatchesView();
    updateHeader();
  } catch(e) { console.error('Load error:', e); }
}

function updateHeader() {
  const live = allMatches.filter(m=>getMatchState(m)==='LIVE').length;
  document.getElementById('hdr-live-dot').style.display = live>0?'block':'none';
  document.getElementById('hdr-stat').textContent = live>0 ? `${live} live · ${allMatches.length} total` : `${allMatches.length} matches`;
}

  }
});
document.getElementById('settings-modal').addEventListener('click', e => { if(e.target===document.getElementById('settings-modal')) closeSettings(); });

loadAllData();
setInterval(loadAllData, 30000);
